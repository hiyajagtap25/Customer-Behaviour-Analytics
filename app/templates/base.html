<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Conversion Intelligence{% endblock %}</title>

  <!-- Google Fonts: Sharp display + clean mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    /* ── Design tokens ─────────────────────────────────── */
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #22222e;
      --accent:    #7c6af7;
      --accent2:   #f7826a;
      --accent3:   #4af7c4;
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --danger:    #f7566a;
      --warning:   #f7c76a;
      --success:   #4af7a0;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius:    10px;
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Sidebar nav ────────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; }

    nav.sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .nav-logo {
      font-family: var(--font-head);
      font-size: 17px;
      color: var(--accent);
      letter-spacing: -0.5px;
      margin-bottom: 32px;
      line-height: 1.2;
    }
    .nav-logo span { color: var(--accent2); }

    nav.sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    nav.sidebar a:hover { background: var(--border); color: var(--text); }
    nav.sidebar a.active { background: rgba(124,106,247,0.15); color: var(--accent); }
    nav.sidebar a .icon { font-size: 16px; width: 20px; text-align: center; }

    .nav-section-label {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 16px 12px 6px;
    }

    /* ── Main content ───────────────────────────────────── */
    main { margin-left: 220px; padding: 40px 48px; flex: 1; max-width: 1200px; }

    /* ── Page header ────────────────────────────────────── */
    .page-header { margin-bottom: 36px; }
    .page-header h1 {
      font-family: var(--font-head);
      font-size: 30px;
      color: var(--text);
      letter-spacing: -0.8px;
      line-height: 1.1;
    }
    .page-header p { color: var(--muted); margin-top: 6px; font-size: 14px; }

    /* ── KPI Cards ──────────────────────────────────────── */
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .kpi-card.kpi-purple::before { background: var(--accent); }
    .kpi-card.kpi-orange::before { background: var(--accent2); }
    .kpi-card.kpi-green::before  { background: var(--accent3); }

    .kpi-label {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .kpi-value {
      font-family: var(--font-head);
      font-size: 38px;
      letter-spacing: -1.5px;
      line-height: 1;
    }
    .kpi-card.kpi-purple .kpi-value { color: var(--accent); }
    .kpi-card.kpi-orange .kpi-value { color: var(--accent2); }
    .kpi-card.kpi-green  .kpi-value { color: var(--accent3); }
    .kpi-sub { color: var(--muted); font-size: 12px; margin-top: 6px; }

    /* ── Cards / panels ─────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 24px;
    }
    .card-title {
      font-family: var(--font-head);
      font-size: 16px;
      color: var(--text);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .badge {
      font-family: var(--font-mono);
      font-size: 10px;
      background: rgba(124,106,247,0.15);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }

    /* ── AI Insight card ────────────────────────────────── */
    .insight-card {
      background: linear-gradient(135deg, rgba(124,106,247,0.08) 0%, rgba(74,247,196,0.05) 100%);
      border: 1px solid rgba(124,106,247,0.25);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 24px;
      position: relative;
    }
    .insight-card .insight-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .insight-card .insight-tag::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .insight-card p { color: var(--text); line-height: 1.7; font-size: 14px; }

    /* ── Table ──────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 12px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px;
      border-bottom: 1px solid rgba(34,34,46,0.5);
      font-size: 13px;
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Pill badges ────────────────────────────────────── */
    .pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--font-mono);
    }
    .pill-home     { background: rgba(124,106,247,0.15); color: var(--accent); }
    .pill-product  { background: rgba(247,130,106,0.15); color: var(--accent2); }
    .pill-cart     { background: rgba(247,199,106,0.15); color: var(--warning); }
    .pill-checkout { background: rgba(74,247,196,0.15);  color: var(--accent3); }
    .pill-other    { background: rgba(107,107,128,0.15); color: var(--muted); }

    /* ── Canvas charts ──────────────────────────────────── */
    .chart-wrap { position: relative; height: 280px; }
    .chart-wrap-tall { position: relative; height: 340px; }

    /* ── Refresh button ─────────────────────────────────── */
    .btn {
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Fade-in animation ──────────────────────────────── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px);} to { opacity:1; transform:none; } }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    .fade-up-2 { animation: fadeUp 0.4s 0.1s ease forwards; opacity: 0; }
    .fade-up-3 { animation: fadeUp 0.4s 0.2s ease forwards; opacity: 0; }
    .fade-up-4 { animation: fadeUp 0.4s 0.3s ease forwards; opacity: 0; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="nav-logo">Conversion<br/><span>Intelligence</span></div>

    <div class="nav-section-label">Analytics</div>
    <a href="/"         class="{% if request.path == '/' %}active{% endif %}">
      <span class="icon">⬛</span> Dashboard
    </a>
    <a href="/devices"  class="{% if request.path == '/devices' %}active{% endif %}">
      <span class="icon">📱</span> Devices
    </a>
    <a href="/sources"  class="{% if request.path == '/sources' %}active{% endif %}">
      <span class="icon">🔗</span> Sources
    </a>

    <div class="nav-section-label">AI</div>
    <a href="/insights" class="{% if request.path == '/insights' %}active{% endif %}">
      <span class="icon">✦</span> AI Insights
    </a>
  </nav>

  <!-- Main -->
  <main>
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
